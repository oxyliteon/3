<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLBB Skillpedia</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/CustomEase.min.js"></script>
<style>
:root {
  --bg:       #080A10;
  --surface:  #0D1018;
  --raised:   #131721;
  --lift:     #1A1F2E;
  --border:   rgba(255,255,255,0.06);
  --rim:      rgba(255,255,255,0.12);
  --gold:     #C9A84C;
  --gold-hi:  #F0CC72;
  --gold-dim: rgba(201,168,76,0.15);
  --p-clr:    #9B8FFF;
  --s1-clr:   #5BAAFF;
  --s2-clr:   #3ED9A0;
  --ult-clr:  #FF7A50;
  --txt:      #DCE2F0;
  --muted:    #626C8A;
  --drawer-w: 300px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{font-family:'DM Sans',sans-serif;color:var(--txt);}

/* ── TOPBAR ───────────────────────────── */
.topbar {
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:54px;
  display:flex;align-items:center;gap:12px;
  padding:0 18px;
  background:rgba(8,10,16,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}
.menu-btn {
  width:36px;height:36px;border-radius:10px;
  background:var(--raised);border:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:5px;padding:9px 8px;
  transition:background .15s, border-color .15s;
}
.menu-btn:hover{background:var(--lift);border-color:var(--rim);}
.menu-btn span {
  display:block;width:18px;height:1.5px;
  background:var(--txt);border-radius:2px;
  transform-origin:center;
}
.topbar-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:19px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold-hi),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-transform:uppercase;
}
.topbar-hero-name {
  margin-left:auto;
  font-size:13px;font-weight:600;color:var(--muted);
  letter-spacing:.5px;
  transition:color .3s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
}
.topbar-hero-name.active{color:var(--gold);}

/* ── OVERLAY ─────────────────────────── */
.overlay {
  position:fixed;inset:0;z-index:290;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.overlay.show{opacity:1;pointer-events:auto;}

/* ── DRAWER ──────────────────────────── */
.drawer {
  position:fixed;top:0;left:0;bottom:0;z-index:300;
  width:var(--drawer-w);
  background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  transform:translateX(calc(-1 * var(--drawer-w)));
  will-change:transform;
  overflow:hidden;
}
.drawer-head {
  padding:18px 18px 14px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.drawer-logo {
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(135deg,var(--gold-hi),var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-transform:uppercase;display:flex;align-items:center;gap:8px;
}
.search-wrap {
  margin-top:12px;position:relative;
}
.search-wrap input {
  width:100%;background:var(--raised);
  border:1px solid var(--border);border-radius:10px;
  padding:9px 12px 9px 36px;
  font-size:13px;color:var(--txt);
  font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search-wrap input:focus{border-color:rgba(201,168,76,.45);box-shadow:0 0 0 3px rgba(201,168,76,.08);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.roles {
  display:flex;flex-wrap:wrap;gap:5px;
  padding:10px 18px;border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.role-pill {
  font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.3px;
  transition:all .15s;
}
.role-pill:hover{color:var(--txt);border-color:var(--rim);}
.role-pill.on{
  background:var(--gold-dim);
  border-color:rgba(201,168,76,.5);
  color:var(--gold-hi);
}
.hero-scroll {
  flex:1;overflow-y:auto;padding:8px;
}
.hero-scroll::-webkit-scrollbar{width:3px;}
.hero-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.hitem {
  padding:9px 12px;border-radius:9px;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--muted);
  transition:background .12s,color .12s,border-color .12s;
  border-left:2px solid transparent;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.hitem:hover{background:var(--raised);color:var(--txt);}
.hitem.on {
  background:linear-gradient(90deg,var(--lift),var(--raised));
  border-left-color:var(--gold);color:var(--gold-hi);font-weight:600;
}
.hero-count {
  padding:8px 18px;font-size:11px;color:var(--muted);
  border-top:1px solid var(--border);flex-shrink:0;
  letter-spacing:.5px;
}

/* ── MAIN CONTENT ────────────────────── */
.main {
  position:fixed;inset:0;top:54px;
  display:flex;flex-direction:column;overflow:hidden;
}
/* ambient glow bg */
.main::before {
  content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 70% 20%, rgba(201,168,76,.04) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(91,170,255,.03) 0%, transparent 60%);
}

/* hero header */
.hero-hd {
  padding:22px 28px 18px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;overflow:hidden;
}
.hero-hd::after {
  content:'';position:absolute;bottom:0;left:28px;right:28px;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold-dim),transparent);
}
.hd-placeholder {
  font-family:'Cormorant Garamond',serif;
  font-size:18px;color:var(--muted);font-weight:600;letter-spacing:1px;
}
.hd-name {
  font-family:'Cormorant Garamond',serif;
  font-size:30px;font-weight:800;letter-spacing:1.5px;
  background:linear-gradient(135deg,#FFF1C8,var(--gold));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  line-height:1;
  display:none;
}
.hd-badges{margin-top:8px;display:flex;gap:7px;flex-wrap:wrap;}
.hd-badge {
  font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;
  background:var(--raised);border:1px solid var(--border);color:var(--muted);
  letter-spacing:.4px;
}

/* skill grid */
.skill-grid {
  flex:1;overflow-y:auto;
  padding:24px 28px 32px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
  align-content:start;
}
.skill-grid::-webkit-scrollbar{width:3px;}
.skill-grid::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* skill card */
.scard {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  padding:18px 20px;
  position:relative;overflow:hidden;
  cursor:default;
  opacity:0;transform:translateY(20px); /* initial state for GSAP */
}
.scard::before {
  content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:16px 16px 0 0;
}
.scard.p::before{background:var(--p-clr);}
.scard.s1::before{background:var(--s1-clr);}
.scard.s2::before{background:var(--s2-clr);}
.scard.ult::before{background:var(--ult-clr);}

.scard-glow {
  position:absolute;top:-40px;right:-40px;
  width:120px;height:120px;border-radius:50%;
  opacity:.07;filter:blur(28px);pointer-events:none;
}
.scard.p .scard-glow{background:var(--p-clr);}
.scard.s1 .scard-glow{background:var(--s1-clr);}
.scard.s2 .scard-glow{background:var(--s2-clr);}
.scard.ult .scard-glow{background:var(--ult-clr);}

.scard:hover {
  border-color:var(--rim);
  background:var(--raised);
}
.scard-tag {
  display:flex;align-items:center;gap:7px;
  margin-bottom:12px;
}
.scard-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.scard.p .scard-dot{background:var(--p-clr);box-shadow:0 0 6px var(--p-clr);}
.scard.s1 .scard-dot{background:var(--s1-clr);box-shadow:0 0 6px var(--s1-clr);}
.scard.s2 .scard-dot{background:var(--s2-clr);box-shadow:0 0 6px var(--s2-clr);}
.scard.ult .scard-dot{background:var(--ult-clr);box-shadow:0 0 6px var(--ult-clr);}

.scard-label {
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
}
.scard.p .scard-label{color:var(--p-clr);}
.scard.s1 .scard-label{color:var(--s1-clr);}
.scard.s2 .scard-label{color:var(--s2-clr);}
.scard.ult .scard-label{color:var(--ult-clr);}

.scard-name {
  font-family:'Cormorant Garamond',serif;
  font-size:19px;font-weight:700;color:var(--txt);
  line-height:1.2;margin-bottom:10px;
}
.scard-meaning {
  font-size:12.5px;line-height:1.6;color:var(--muted);
  border-top:1px solid var(--border);padding-top:10px;
  font-style:italic;
}

/* empty */
.empty {
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:320px;gap:14px;color:var(--muted);text-align:center;
}
.empty-ico{font-size:48px;opacity:.3;}
.empty-t1{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:700;color:#4A5270;}
.empty-t2{font-size:13px;}

/* ── RESPONSIVE ──────────────────────── */
@media(max-width:600px){
  .skill-grid{padding:16px;grid-template-columns:1fr;}
  .hero-hd{padding:16px 18px;}
  .hd-name{font-size:24px;}
  :root{--drawer-w:270px;}
}
</style>
</head>

function fallback(n){return{
  p:{n:`${n}'s Resolve`,m:`Tekad ${n}`},
  s1:{n:`${n}'s Strike`,m:`Serangan ${n}`},
  s2:{n:`${n}'s Blessing`,m:`Berkah ${n}`},
  ult:{n:`${n}'s Wrath`,m:`Kemurkaan ${n}`}
};}

// ── STATE ────────────────────────────────────────────────────
let activeRole="All", query="", selected=null, drawerOpen=false;

// ── DRAWER LOGIC ─────────────────────────────────────────────
const drawer=document.getElementById("drawer");
const overlay=document.getElementById("overlay");
const menuBtn=document.getElementById("menuBtn");
const bar1=document.getElementById("bar1"), bar2=document.getElementById("bar2"), bar3=document.getElementById("bar3");

function openDrawer(){
  drawerOpen=true;
  gsap.to(drawer,{x:0,duration:.38,ease:"power3.out"});
  overlay.classList.add("show");
  gsap.to(bar1,{y:6.5,rotation:45,duration:.25,ease:"power2.inOut"});
  gsap.to(bar2,{opacity:0,duration:.15});
  gsap.to(bar3,{y:-6.5,rotation:-45,duration:.25,ease:"power2.inOut"});
}
function closeDrawer(){
  drawerOpen=false;
  gsap.to(drawer,{x:-300,duration:.32,ease:"power3.in"});
  overlay.classList.remove("show");
  gsap.to(bar1,{y:0,rotation:0,duration:.25,ease:"power2.inOut"});
  gsap.to(bar2,{opacity:1,duration:.2});
  gsap.to(bar3,{y:0,rotation:0,duration:.25,ease:"power2.inOut"});
}
menuBtn.addEventListener("click",()=>drawerOpen?closeDrawer():openDrawer());
overlay.addEventListener("click",closeDrawer);

// ── ROLE TABS ────────────────────────────────────────────────
const roleRow=document.getElementById("roleRow");
function buildRoles(){
  roleRow.innerHTML=ROLES.map(r=>
    `<button class="role-pill${activeRole===r?" on":""}" data-r="${r}">${r}</button>`
  ).join("");
  roleRow.querySelectorAll(".role-pill").forEach(b=>{
    b.addEventListener("click",()=>{
      activeRole=b.dataset.r;buildRoles();renderList();
    });
  });
}

// ── HERO LIST ────────────────────────────────────────────────
function filtered(){
  return HEROES.filter(([n,r])=>{
    const matchR=activeRole==="All"||r.split("/").includes(activeRole);
    const matchQ=!query||n.toLowerCase().includes(query);
    return matchR&&matchQ;
  });
}
function renderList(){
  const list=filtered();
  const el=document.getElementById("heroScroll");
  const countEl=document.getElementById("heroCount");
  countEl.textContent=`${list.length} hero`;
  if(!list.length){el.innerHTML=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px;">Tidak ditemukan</div>`;return;}
  el.innerHTML=list.map(([n])=>
    `<div class="hitem${selected===n?" on":""}" data-n="${n}">${n}</div>`
  ).join("");
  el.querySelectorAll(".hitem").forEach(item=>{
    item.addEventListener("click",()=>{
      selected=item.dataset.n;
      const hero=HEROES.find(([n])=>n===selected);
      renderList();
      showSkills(selected, hero?hero[1]:"");
      // close drawer on mobile after pick
      if(window.innerWidth<768) closeDrawer();
    });
  });
}

// ── SEARCH ───────────────────────────────────────────────────
document.getElementById("searchInput").addEventListener("input",e=>{
  query=e.target.value.toLowerCase().trim();
  renderList();
});

// ── SKILL DISPLAY ────────────────────────────────────────────
const CARDS=[
  {key:"p",  cls:"p",   label:"PASIF"},
  {key:"s1", cls:"s1",  label:"SKILL 1"},
  {key:"s2", cls:"s2",  label:"SKILL 2"},
  {key:"ult",cls:"ult", label:"ULTIMATE"},
];

function showSkills(name,roles){
  const skills=DB[name]||fallback(name);

  // topbar
  const topbar=document.getElementById("topbarHero");
  gsap.to(topbar,{opacity:0,duration:.15,onComplete:()=>{
    topbar.textContent=name;topbar.classList.add("active");
    gsap.to(topbar,{opacity:1,duration:.2});
  }});

  // header
  const hd=document.getElementById("hdName");
  const ph=document.getElementById("hdPlaceholder");
  const badges=document.getElementById("hdBadges");
  gsap.to(ph,{opacity:0,duration:.15,onComplete:()=>{ph.style.display="none";}});
  hd.style.display="block";
  hd.textContent=name;
  gsap.fromTo(hd,{opacity:0,y:10},{opacity:1,y:0,duration:.4,ease:"power3.out"});
  badges.innerHTML=roles.split("/").map(r=>`<span class="hd-badge">${r.trim()}</span>`).join("");
  gsap.fromTo(badges,{opacity:0,y:8},{opacity:1,y:0,duration:.35,delay:.1,ease:"power3.out"});

  // cards
  const grid=document.getElementById("skillGrid");
  gsap.to(grid.querySelectorAll(".scard"),{
    opacity:0,y:12,duration:.18,stagger:.04,ease:"power2.in",
    onComplete:()=>{
      grid.innerHTML=CARDS.map(({key,cls,label})=>{
        const s=skills[key]||{n:"—",m:"—"};
        return `<div class="scard ${cls}">
          <div class="scard-glow"></div>
          <div class="scard-tag">
            <span class="scard-dot"></span>
            <span class="scard-label">${label}</span>
          </div>
          <div class="scard-name">${esc(s.n)}</div>
          <div class="scard-meaning">"${esc(s.m)}"</div>
        </div>`;
      }).join("");
      gsap.to(grid.querySelectorAll(".scard"),{
        opacity:1,y:0,duration:.45,stagger:.08,ease:"power3.out",delay:.05
      });
    }
  });
}

function esc(s){return s?s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])):"-";}

// ── INIT ─────────────────────────────────────────────────────
gsap.set(drawer,{x:-300});
buildRoles();
renderList();

// entrance animation
gsap.from(".topbar",{y:-54,opacity:0,duration:.5,ease:"power3.out"});
gsap.from(".main",{opacity:0,duration:.6,delay:.2,ease:"power2.out"});
</script>
